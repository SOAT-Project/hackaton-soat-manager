apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hackaton-soat-manager-hpa
  namespace: hackaton-soat-manager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hackaton-soat-manager
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50