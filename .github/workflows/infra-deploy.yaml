name: Infra Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'terraform/**'

permissions:
  id-token: write
  contents: read

jobs:

  set_environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.branch_map.outputs.environment }}

    steps:
      - id: branch_map
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          ENVIRONMENT=""

          case "$BRANCH_NAME" in
            "develop")
              ENVIRONMENT="dev"
              ;;
            "main")
              ENVIRONMENT="prod"
              ;;
            *)
              echo "Branch $BRANCH_NAME não mapeada. Abortando."
              exit 1
              ;;
          esac

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "Ambiente mapeado: $ENVIRONMENT"

  terraform:
    needs: set_environment
    uses: ./.github/workflows/terraform.yaml
    with:
      environment: ${{ needs.set_environment.outputs.environment }}
      image_tag: keep
    secrets: inherit