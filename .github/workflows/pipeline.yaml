name: Pipeline

on:
  push:
    branches: [main, develop]

permissions:
  id-token: write
  contents: read

jobs:

  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      terraform: ${{ steps.filter.outputs.terraform }}
      github: ${{ steps.filter.outputs.github }}
      environment: ${{ steps.branch_map.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          filters: |
            terraform:
              - 'terraform/**'

            github:
              - '.github/**'

            app:
              - 'src/**'
              - 'build.gradle'
              - 'Dockerfile'

      - name: Map branch to environment
        id: branch_map
        run: |
          BRANCH_NAME="${{ github.ref_name }}"

          case "$BRANCH_NAME" in
            develop) ENVIRONMENT="dev" ;;
            main) ENVIRONMENT="prod" ;;
            *) echo "Branch não suportada"; exit 1 ;;
          esac

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT

      - name: Debug outputs
        run: |
          echo "APP=${{ steps.filter.outputs.app }}"
          echo "TERRAFORM=${{ steps.filter.outputs.terraform }}"
          echo "GITHUB=${{ steps.filter.outputs.github }}"


  app_deploy:
    needs: detect_changes
    if: needs.detect_changes.outputs.app == 'true'
    uses: ./.github/workflows/app-deploy.yaml
    with:
      environment: ${{ needs.detect_changes.outputs.environment }}
    secrets: inherit


  infra_deploy:
    needs: detect_changes
    if: |
      needs.detect_changes.outputs.app == 'false' &&
      (
        needs.detect_changes.outputs.terraform == 'true' ||
        needs.detect_changes.outputs.github == 'true'
      )
    uses: ./.github/workflows/infra-deploy.yaml
    with:
      environment: ${{ needs.detect_changes.outputs.environment }}
    secrets: inherit