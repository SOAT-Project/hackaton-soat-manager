name: App Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'Dockerfile'

permissions:
  id-token: write
  contents: read

jobs:

  set_environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.branch_map.outputs.environment }}

    steps:
      - id: branch_map
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          ENVIRONMENT=""

          case "$BRANCH_NAME" in
            "develop")
              ENVIRONMENT="dev"
              ;;
            "main")
              ENVIRONMENT="prod"
              ;;
            *)
              echo "Branch $BRANCH_NAME não mapeada. Abortando."
              exit 1
              ;;
          esac

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "Ambiente mapeado: $ENVIRONMENT"

  build:
    needs: set_environment
    uses: ./.github/workflows/docker.yaml
    with:
      image_name: srteixeiradias/hackaton-soat-api
      image_tag: latest
    secrets:
      DOCKERHUB_LOGIN: ${{ secrets.DOCKERHUB_LOGIN }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy:
    needs: [set_environment, build]
    uses: ./.github/workflows/terraform.yaml
    with:
      environment: ${{ needs.set_environment.outputs.environment }}
      image_tag: latest
    secrets: inherit